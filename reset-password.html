<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Awesome Test</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Reusing Login page styles for consistency */
        .auth-container {
            background: var(--white);
            padding: 40px 30px; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(41, 128, 185, 0.15); 
            width: 100%;
            max-width: 380px; 
            text-align: center;
        }
        .auth-container h2 { 
            color: var(--primary); 
            margin-bottom: 20px; 
            font-weight: 700;
        }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            font-size: 1rem;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background: #2471a3;
            transform: translateY(-1px);
        }
        .status-msg {
            margin-top: 15px;
            font-weight: 500;
        }
        .back-link {
            font-size: 0.9rem;
            margin-top: 20px;
            display: block;
            color: var(--dark);
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Awesome test</a>
    </nav>

    <header class="hero" id="auth-hero">
        <div class="auth-container">
            <h2><i class="fas fa-lock" style="margin-right: 8px;"></i> Reset Your Password</h2>
            
            <p style="color: #666; font-size: 0.95rem; margin-bottom: 25px;">
                Enter your account email address to receive a password reset link.
            </p>

            <div class="input-group">
                <input type="email" id="reset-email" placeholder="Enter Email Address">
            </div>

            <button class="btn-auth" onclick="handlePasswordReset()">Send Reset Link</button>

            <p class="status-msg" id="reset-message"></p>
            
            <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </header>

<script type="module">
    // 🛑 FIREBASE SDK IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
    // 🛑 AAPKI FIREBASE CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyAdSJleHGBOOCGv14n1gKgm-JfyAR5rKDM",
        authDomain: "ujjwal-test-69e8d.firebaseapp.com",
        projectId: "ujjwal-test-69e8d",
        storageBucket: "ujjwal-test-69e8d.firebasestorage.app",
        messagingSenderId: "1079902323676",
        appId: "1:1079902323676:web:c967fed7a9ade8f2b78519"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    const resetMessage = document.getElementById('reset-message');

    window.handlePasswordReset = async function() {
        const email = document.getElementById('reset-email').value;
        if (!email) {
            resetMessage.innerText = 'Please enter a valid email address.';
            resetMessage.style.color = '#e74c3c';
            return;
        }

        resetMessage.innerText = `Sending reset link to ${email}...`;
        resetMessage.style.color = '#3498db';

        try {
            await sendPasswordResetEmail(auth, email);
            
            // Success message with spam folder check
            resetMessage.innerText = `Success! A password reset link has been sent to your email address. Please check your inbox, spam, or junk folder.`;
            resetMessage.style.color = '#2ecc71';

        } catch (error) {
            resetMessage.innerText = `Password Reset Failed: ${error.message}. Please verify the email address is correct.`;
            resetMessage.style.color = '#e74c3c';
        }
    }
</script>

</body>
</html>
